name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (changed files only)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bunx biome check --changed --since="$BASE_REF" --max-diagnostics=50

      - name: Lint (all)
        if: github.event_name == 'push'
        run: bun run lint --max-diagnostics=20

      - name: Build
        run: bun run build

      - name: Smoke test
        run: bun test
